<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Toutes les iles</h1>
    {% if iles %}
    {% for ile in iles %}
    <div>
        <a class="badge-ile" href="/island/{{ile['id_ile']}}">{{ile['nom_ile']}}</a>
        note: {{ ile['moyenne'] }}
        <a href="/rate_island/{{ ile['id_ile'] }}">noter</a>
    </div>
    {% endfor %}
    {% else %}
    <p>Aucune île disponible</p>
    {% endif %}
</body>

</html>
