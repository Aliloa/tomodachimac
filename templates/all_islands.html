<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Toutes les iles</h1>
    {% if iles %}
        {% for ile in iles %}
            <a href="/rate_island/{{ ile['id_ile'] }}">{{ ile['nom_ile'] }}</a>
        {% endfor %}
    {% else %}
        <p>Aucune île disponible</p>
    {% endif %}
</body>

</html>
