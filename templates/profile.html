<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/style/style.css">
    <link rel="icon" type="image/png" href="../static/style/assets/logo_tomodachimac.png">
    <title>Profil</title>
</head>

<body>
    <div class="carte">
        {% if session['user'] %}

        <p>Hello {{session['user']['pseudo']}}</p>

        {% if iles %}
        {% for ile in iles %}
        <div class="ile-bloc">
            <form action="/rename_island/{{ ile['id_ile']}}" method="POST">
                <input type="text" value="{{ile['nom_ile']}}" name="nom">
                <button type="submit" class="boutton-sm">Rename</button>
            </form>
            <div class="ile-actions">
                <a class="boutton-sm" href="/island/{{ile['id_ile']}}">Open</a>
                <a class="boutton-sm" href="/rate_island/{{ ile['id_ile'] }}">Rate</a>
                <form action="/delete_island/{{ ile['id_ile']}}" method="POST">
                    <button type="submit" class="boutton-danger">Delete</button>
                </form>
            </div>
        </div>
        {% endfor %}
        <hr class="separateur">
        <p><a class="lien-secondaire" href="/create_island">Add a new island</a></p>
        <p><a href="/all_islands">Show every island</a></p>
        {% else %}
        <p>You don't have any island <a href="/create_island">create island</a></p>
        {% endif %}

        {% else %}
        <p>Vous n'êtes pas connecté <a href="">se connecter</a></p>
        {% endif %}
    </div>
</body>

</html>
