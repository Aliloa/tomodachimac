<!DOCTYPE html>
<html>

<head>
    <title>Island creation</title>
    <link rel="stylesheet" href="../static/style/style.css">
</head>

<body>
    <h1>Créer une nouvelle ile</h1>
    {% if erreur %}
    <p style="color:red">{{ erreur }}</p>
    {% endif %}
    <form action='/create_island' method='POST'>
        <label>Nom de votre île : <input type="text" name="nom" required></label>
        <button type='submit'>Ajouter</button>
    </form>
</body>

<a href="/profile">Retour au profil</a>
</body>

</html>
