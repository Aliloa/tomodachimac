<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Mii</title>
    <script src="../static/js/create_mii.js"></script> <!-- for crush imput if crush exists -->
</head>
<body>
    <h1>create new mii</h1>
    {% if erreur %}
        <p style="color:red">{{erreur}}</p>
    {% endif %}
    <form action="/create_mii" method="POST" enctype="multipart/form-data">
        Name: <input type="text" name="name">
        Age: <input type="number" name="age">
        Sex:
        <select name="sex">
            <option value="woman">woman</option>
            <option value="man">man</option>
        </select>
        Personnality:
        <select name="personnality">
            <option value="considerate">considerate</option>
            <option value="outgoing">outgoing</option>
            <option value="reserved">reserved</option>
            <option value="ambitious">ambitious</option>
        </select>
        Import mii image: <input type="file" name="image" accept="image/*">

        Does your mii have a crush on an existing mii on {{idIsland}} island ?
        <select name="crush_choice" class="user_choice" onchange="toggleInput()">
            <option value="yes">yes</option>
            <option value="no">no</option>
        </select>

        <div class="user-input" style="display:none;">
            <select name="crush_id" class="user_id">
                <option value="">Which one ?
                    {% for mii in allIslandMiis%}
                        <option value="{{mii.id_mii}}">{{mii.nom_mii}}</option>
                    {% endfor %}
                </option>
            </select>
        </div>

        Does your mii have an existing mii for partner on {{idIsland}} island ?
        <select name="crush_choice" class="user_choice" onchange="toggleInput()">
            <option value="yes">yes</option>
            <option value="no">no</option>
        </select>

        <div class="user-input" style="display:none;">
            <select name="crush_id" class="user_id">
                <option value="">Which one ?
                    {% for mii in allIslandMiis%}
                        <option value="{{mii.id_mii}}">{{mii.nom_mii}}</option>
                    {% endfor %}
                </option>
            </select>
        </div>

        <input type="hidden" name="id_ile" value="{{idIsland}}"> <!-- hidden input to get id_ile -->
        <button type='submit'>Create mii</button>
    </form>
</body>
</html>
