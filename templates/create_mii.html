<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a Mii – TomoDachImac</title>
    <link rel="stylesheet" href="../static/style/style.css">
    <link rel="icon" type="image/png" href="../static/style/assets/logo_tomodachimac.png">
    <script src="../static/js/create_mii.js" defer></script>
</head>
<body>
    <div class="logo">
        <img src="{{ url_for('static', filename='style/assets/logo_tomodachimac.png') }}" alt="TomoDachImac">
    </div>

    <div class="carte-large">
        <h2>Create a new Mii</h2>

        {% if erreur %}
            <p class="erreur">{{erreur}}</p>
        {% endif %}

        <form action="/create_mii/{{id_ile}}" method="POST" enctype="multipart/form-data" class="form-mii">

            <hr class="separateur-section">
            <p class="form-section-title">General information</p>

            <div class="champ">
                <label>Name</label>
                <input type="text" name="name" required>
            </div>

            <div class="champ">
                <label>Age</label>
                <input type="number" name="age" required>
            </div>

            <div class="champ">
                <label>Sex</label>
                <select name="sex">
                    <option value="woman">Woman</option>
                    <option value="man">Man</option>
                </select>
            </div>

            <div class="champ">
                <label>Personality</label>
                <select name="personnality">
                    <option value="considerate">Considerate</option>
                    <option value="outgoing">Outgoing</option>
                    <option value="reserved">Reserved</option>
                    <option value="ambitious">Ambitious</option>
                </select>
            </div>

            <div class="champ">
                <label>Mii image</label>
                <input type="file" name="image" accept="image/*">
            </div>

            <hr class="separateur-section">
            <p class="form-section-title">Relationships on {{islandName}} island</p>

            <div class="champ">
                <label>Does your mii have a crush on an existing mii?</label>
                <select name="crush_choice" class="user_choice">
                    <option value="none">none</option>
                    {% for mii in allIslandMiis%}
                        <option value="{{mii.id_mii}}">{{mii.nom_mii}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="champ">
                <label>Does your mii have a partner on this island?</label>
                <select name="partner_choice" class="user_choice">
                    <option value="none">none</option>
                    {% for mii in allIslandMiis%}
                        <option value="{{mii.id_mii}}">{{mii.nom_mii}}</option>
                    {% endfor %}
                </select>
            </div>

            <hr class="separateur-section">
            <p class="form-section-title">Family on {{islandName}} island</p>

            <div class="champ">
                <label>Is your mii part of an existing family?</label>
                <select name="family_choice" class="user_choice">
                    <option value="none">no</option>
                    {% for family in allIslandFamilies %}
                        <option value="{{family.id_famille}}">{{family.nom_famille}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="champ">
                <label>If not, create a new family (leave empty to skip)</label>
                <input type="text" name="family_name">
            </div>

            <div class="champ">
                <label>Who is their father?</label>
                <select name="father_choice" class="user_choice">
                    <option value="none">none</option>
                    {% for mii in allIslandMiis%}
                        <option value="{{mii.id_mii}}">{{mii.nom_mii}}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="champ">
                <label>Who is their mother?</label>
                <select name="mother_choice" class="user_choice">
                    <option value="none">none</option>
                    {% for mii in allIslandMiis%}
                        <option value="{{mii.id_mii}}">{{mii.nom_mii}}</option>
                    {% endfor %}
                </select>
            </div>

            <input type="hidden" name="id_ile" value="{{id_ile}}">

            <div style="margin-top:8px;">
                <button type="submit" class="boutton">Create Mii</button>
            </div>
        </form>

        <p class="lien-secondaire"><a href="/island/{{id_ile}}">Back to island</a></p>
    </div>
</body>
</html>
