<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a Mii – TomoDachImac</title>
    <link rel="stylesheet" href="../static/style/style.css">
    <link rel="icon" type="image/png" href="../static/style/assets/logo_tomodachimac.png">
    <script src="../static/js/create_mii.js" defer></script>
</head>
<body>
    <div class="logo">
        <img src="{{ url_for('static', filename='style/assets/logo_tomodachimac.png') }}" alt="TomoDachImac">
    </div>

    <div class="carte-large">
        <h2>Create a new Mii</h2>

        {% if erreur %}
            <p class="erreur">{{ erreur }}</p>
        {% endif %}

        <form action="/create_mii/{{ id_ile }}" method="POST" enctype="multipart/form-data" class="form-mii">

            <div class="champ">
                <label>Name</label>
                <input type="text" name="name" required>
            </div>

            <div class="champ">
                <label>Age</label>
                <input type="number" name="age" min="0" max="120" required>
            </div>

            <div class="champ">
                <label>Sex</label>
                <select name="sex">
                    <option value="woman">Woman</option>
                    <option value="man">Man</option>
                </select>
            </div>

            <div class="champ">
                <label>Personality</label>
                <select name="personnality">
                    <option value="considerate">Considerate</option>
                    <option value="outgoing">Outgoing</option>
                    <option value="reserved">Reserved</option>
                    <option value="ambitious">Ambitious</option>
                </select>
            </div>

            <div class="champ">
                <label>Mii image</label>
                <input type="file" name="image" accept="image/*">
            </div>

            <hr class="separateur">

            <div class="champ">
                <label>Does your mii have a crush on {{ idIsland }} island?</label>
                <select name="crush_choice">
                    <option value="none" selected>— none —</option>
                    {% for mii in allIslandMiis %}
                        <option value="{{ mii.id_mii }}">{{ mii.nom_mii }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="champ">
                <label>Does your mii have a partner on {{ idIsland }} island?</label>
                <select name="partner_choice">
                    <option value="none" selected>— none —</option>
                    {% for mii in allIslandMiis %}
                        <option value="{{ mii.id_mii }}">{{ mii.nom_mii }}</option>
                    {% endfor %}
                </select>
            </div>

            <hr class="separateur">

            <div class="champ">
                <label>Is your mii part of a family on {{ idIsland }} island?</label>
                <select name="family_choice" id="id_famille" onchange="toggleFamilyLinks()">
                    <option value="none" selected>— none —</option>
                    {% for family in allIslandFamilies %}
                        <option value="{{ family.id_famille }}">{{ family.nom_famille }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="champ">
                <label>Who is their father on {{ idIsland }} island?</label>
                <select name="id_pere">
                    <option value="none" selected>— none —</option>
                    {% for mii in allIslandMiis %}
                        <option value="{{ mii.id_mii }}">{{ mii.nom_mii }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="champ">
                <label>Who is their mother on {{ idIsland }} island?</label>
                <select name="id_mere">
                    <option value="none" selected>— none —</option>
                    {% for mii in allIslandMiis %}
                        <option value="{{ mii.id_mii }}">{{ mii.nom_mii }}</option>
                    {% endfor %}
                </select>
            </div>

            <input type="hidden" name="id_ile" value="{{ idIsland }}">

            <div style="margin-top:8px;">
                <button type="submit" class="boutton">Create Mii</button>
            </div>
        </form>

        <p class="lien-secondaire"><a href="/island/{{ id_ile }}">← Back to island</a></p>
    </div>
</body>
</html>
